name: KernelSU / KernelSU-Next LKM CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  GH_USERNAME: realahnet
  KSUPATCHER_REPO: akuatech/ksupatcher

jobs:
  check-upstream-releases:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.compare.outputs.should_run }}
      latest_ksu: ${{ steps.latest.outputs.latest_ksu }}
      latest_ksun: ${{ steps.latest.outputs.latest_ksun }}
      latest_ksu_ksud_url: ${{ steps.latest.outputs.latest_ksu_ksud_url }}
      latest_ksu_apk_url: ${{ steps.latest.outputs.latest_ksu_apk_url }}
      latest_ksun_ksud_url: ${{ steps.latest.outputs.latest_ksun_ksud_url }}
      latest_ksun_apk_url: ${{ steps.latest.outputs.latest_ksun_apk_url }}

    steps:
      - name: Fetch latest upstream releases
        id: latest
        run: |
          set -euo pipefail

          latestksu_json=$(curl -fsSL https://api.github.com/repos/Tiann/KernelSU/releases/latest)
          latestksun_json=$(curl -fsSL https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest)

          latestksu=$(jq -r '.tag_name' <<< "${latestksu_json}")
          latestksun=$(jq -r '.tag_name' <<< "${latestksun_json}")
          latestksu_ksud_url=$(jq -r '([.assets[]? | select(.name == "ksud-aarch64-linux-android") | .browser_download_url][0]) // ""' <<< "${latestksu_json}")
          latestksu_apk_url=$(jq -r '([.assets[]? | select(.name | endswith("-release.apk")) | .browser_download_url][0]) // ""' <<< "${latestksu_json}")
          latestksun_ksud_url=$(jq -r '([.assets[]? | select(.name == "ksud-aarch64-linux-android") | .browser_download_url][0]) // ""' <<< "${latestksun_json}")
          latestksun_apk_url=$(jq -r '([.assets[]? | select(.name | endswith("-release.apk")) | .browser_download_url][0]) // ""' <<< "${latestksun_json}")

          echo "latest_ksu=${latestksu}" >> "$GITHUB_OUTPUT"
          echo "latest_ksun=${latestksun}" >> "$GITHUB_OUTPUT"
          echo "latest_ksu_ksud_url=${latestksu_ksud_url}" >> "$GITHUB_OUTPUT"
          echo "latest_ksu_apk_url=${latestksu_apk_url}" >> "$GITHUB_OUTPUT"
          echo "latest_ksun_ksud_url=${latestksun_ksud_url}" >> "$GITHUB_OUTPUT"
          echo "latest_ksun_apk_url=${latestksun_apk_url}" >> "$GITHUB_OUTPUT"

      - name: Compare against current KSUD binaries
        id: compare
        env:
          LATEST_KSU: ${{ steps.latest.outputs.latest_ksu }}
          LATEST_KSUN: ${{ steps.latest.outputs.latest_ksun }}
          LATEST_KSU_KSUD_URL: ${{ steps.latest.outputs.latest_ksu_ksud_url }}
          LATEST_KSU_APK_URL: ${{ steps.latest.outputs.latest_ksu_apk_url }}
          LATEST_KSUN_KSUD_URL: ${{ steps.latest.outputs.latest_ksun_ksud_url }}
          LATEST_KSUN_APK_URL: ${{ steps.latest.outputs.latest_ksun_apk_url }}
        run: |
          set -euo pipefail

          download_ksud() {
            local direct_url="$1"
            local apk_url="$2"
            local output="$3"
            local tmpdir

            if [ -n "${direct_url}" ]; then
              echo "Downloading KSUD from ${direct_url}"
              curl -fL --retry 3 --retry-delay 2 "${direct_url}" -o "${output}"
              return 0
            fi

            if [ -z "${apk_url}" ]; then
              echo "No downloadable KSUD source was published for ${output}"
              return 1
            fi

            tmpdir=$(mktemp -d)
            echo "Standalone KSUD asset missing, extracting libksud.so from ${apk_url}"
            curl -fL --retry 3 --retry-delay 2 "${apk_url}" -o "${tmpdir}/release.apk"
            unzip -p "${tmpdir}/release.apk" lib/arm64-v8a/libksud.so > "${output}"
            rm -rf "${tmpdir}"
          }

          git clone --depth=1 "https://github.com/${KSUPATCHER_REPO}.git" ksupatcher
          mkdir -p latest

          download_ksud "${LATEST_KSU_KSUD_URL}" "${LATEST_KSU_APK_URL}" latest/libksud.so
          download_ksud "${LATEST_KSUN_KSUD_URL}" "${LATEST_KSUN_APK_URL}" latest/libksud_next.so

          current_ksu="ksupatcher/app/src/main/jniLibs/arm64-v8a/libksud.so"
          current_ksun="ksupatcher/app/src/main/jniLibs/arm64-v8a/libksud_next.so"

          echo "Latest KernelSU release: ${LATEST_KSU}"
          echo "Latest KernelSU-Next release: ${LATEST_KSUN}"

          if [ ! -f "${current_ksu}" ] || [ ! -f "${current_ksun}" ]; then
            echo "Current KSUD binaries are missing in ${KSUPATCHER_REPO}"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif ! cmp -s latest/libksud.so "${current_ksu}" || ! cmp -s latest/libksud_next.so "${current_ksun}"; then
            echo "Detected upstream KSUD binary change"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Current KSUD binaries already match upstream releases"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  lkm-builder:
    needs: check-upstream-releases
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-upstream-releases.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    env:
      LATEST_KSU: ${{ needs.check-upstream-releases.outputs.latest_ksu }}
      LATEST_KSUN: ${{ needs.check-upstream-releases.outputs.latest_ksun }}
      LATEST_KSU_KSUD_URL: ${{ needs.check-upstream-releases.outputs.latest_ksu_ksud_url }}
      LATEST_KSU_APK_URL: ${{ needs.check-upstream-releases.outputs.latest_ksu_apk_url }}
      LATEST_KSUN_KSUD_URL: ${{ needs.check-upstream-releases.outputs.latest_ksun_ksud_url }}
      LATEST_KSUN_APK_URL: ${{ needs.check-upstream-releases.outputs.latest_ksun_apk_url }}

    steps:
      - name: Environment Initialization
        run: |
          sudo dnf install gcc clang lld repo bc flex openssl-devel openssl-devel-engine elfutils-libelf-devel wget tar zstd bsdtar file rsync zip bison cmp which git git-lfs openssl cpio llvm jq -y
          git lfs install
      - name: Clone Kernel
        run: |
          git clone --depth=1 https://github.com/realahnet/kernel_oneplus_sm8650.git sm8650
          git clone --depth=1 https://github.com/yaap/kernel_oneplus_sm8650-modules.git sm8650-modules
      - name: Build KSU LKM
        run: |
          cd sm8650
          curl -L https://github.com/ast-grep/ast-grep/releases/download/0.39.6/app-x86_64-unknown-linux-gnu.zip -o /tmp/astgrep.zip && unzip -j /tmp/astgrep.zip 'ast-grep' && chmod +x ast-grep && rm /tmp/astgrep.zip
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          ./ast-grep -U -p '$$$ check_exports($$$) {$$$}' -r '' scripts/mod/modpost.c
          ./ast-grep -U -p 'check_exports($$$);' -r '' scripts/mod/modpost.c
          sed -i '/config KSU/,/help/{s/default y/default m/}' drivers/kernelsu/Kconfig
          wget https://raw.githubusercontent.com/realahnet/Releases/refs/heads/main/files/build_ksu_sm8650.sh
          chmod +x build_ksu_sm8650.sh
          ./build_ksu_sm8650.sh
          ./toolchains/clang/bin/llvm-objcopy --strip-debug out/drivers/kernelsu/kernelsu.ko ./kernelsu.ko
          rm -rf KernelSU/ drivers/kernelsu
          git restore drivers/ scripts/
      - name: Build KSUN LKM
        run: |
          cd sm8650
          sed -i 's|out|out2|' build_ksu_sm8650.sh
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
          ./ast-grep -U -p '$$$ check_exports($$$) {$$$}' -r '' scripts/mod/modpost.c
          ./ast-grep -U -p 'check_exports($$$);' -r '' scripts/mod/modpost.c
          sed -i '/config KSU/,/help/{s/default y/default m/}' drivers/kernelsu/Kconfig
          ./build_ksu_sm8650.sh
          toolchains/clang/bin/llvm-objcopy --strip-debug out2/drivers/kernelsu/kernelsu.ko ./kernelsu_next.ko
          echo "DATE=$(date -u '+%Y%m%d%I%M')" >> $GITHUB_ENV
          echo "DATE=$DATE"
      - name: Upload output to Github Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "sm8650/kernelsu.ko,sm8650/kernelsu_next.ko"
          name: "KernelSU / KernelSU-Next LKM for OnePlus 12 / OnePlus Ace 5 / OnePlus 13R"
          tag: "ksu_lkm-${{ env.DATE }}"
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Push KSUD
        run: |
          set -euo pipefail

          download_ksud() {
            local direct_url="$1"
            local apk_url="$2"
            local output="$3"
            local tmpdir

            if [ -n "${direct_url}" ]; then
              echo "Downloading KSUD from ${direct_url}"
              curl -fL --retry 3 --retry-delay 2 "${direct_url}" -o "${output}"
              chmod 0644 "${output}"
              return 0
            fi

            if [ -z "${apk_url}" ]; then
              echo "No downloadable KSUD source was published for ${output}"
              return 1
            fi

            tmpdir=$(mktemp -d)
            echo "Standalone KSUD asset missing, extracting libksud.so from ${apk_url}"
            curl -fL --retry 3 --retry-delay 2 "${apk_url}" -o "${tmpdir}/release.apk"
            unzip -p "${tmpdir}/release.apk" lib/arm64-v8a/libksud.so > "${output}"
            chmod 0644 "${output}"
            rm -rf "${tmpdir}"
          }

          git config --global user.name "realahnet"
          git config --global user.email "syedmusicrealise@gmail.com"

          git clone "https://${GH_USERNAME}:${GH_TOKEN}@github.com/${KSUPATCHER_REPO}.git" ksupatcher
          cd ksupatcher

          mkdir -p app/src/main/jniLibs/arm64-v8a
          download_ksud "${LATEST_KSU_KSUD_URL}" "${LATEST_KSU_APK_URL}" app/src/main/jniLibs/arm64-v8a/libksud.so
          download_ksud "${LATEST_KSUN_KSUD_URL}" "${LATEST_KSUN_APK_URL}" app/src/main/jniLibs/arm64-v8a/libksud_next.so

          if git diff --quiet -- app/src/main/jniLibs/arm64-v8a; then
            echo "No KSUD updates detected"
            exit 0
          fi

          git add app/src/main/jniLibs/arm64-v8a
          git commit -m "ksupatcher: Update KSUD assets" \
            -m "KernelSU: ${LATEST_KSU}" \
            -m "KernelSU-Next: ${LATEST_KSUN}"
          git push origin HEAD
